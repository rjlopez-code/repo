{% extends "base.html" %}
{% block content %}

<div class="tulip-form-container">
    <div class="form-header">
        <div class="tulip-icon">👥</div>
        <h2 class="form-title">Add New User</h2>
    </div>

    <form method="POST" class="tulip-form">
        <div class="form-section">
            <div class="form-group">
                <label class="tulip-label">👤 Username</label>
                <input type="text" name="username" class="tulip-input" required>
            </div>

            <div class="form-group">
                <label class="tulip-label">📝 Full Name</label>
                <input type="text" name="full_name" class="tulip-input">
            </div>

            <div class="form-group">
                <label class="tulip-label">🔑 Password</label>
                <input type="password" name="password" class="tulip-input" required>
            </div>

            <div class="form-group">
                <label class="tulip-label">⚡ Role</label>
                <select name="role" class="tulip-select" required>
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
        </div>

        <div class="form-actions">
            <a href="/users" class="tulip-btn tulip-btn-secondary">Cancel</a>
            <button type="submit" class="tulip-btn tulip-btn-primary">Create User</button>
        </div>
    </form>
</div>

{% endblock %}
